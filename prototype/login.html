<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 胸有成影医疗影像数据管理系统</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-form">
            <h2>胸有成影医疗影像数据管理系统</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    <div id="password-strength" style="margin-top: 5px; font-size: 12px;">请输入密码</div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">登录</button>
            </form>
        </div>
    </div>
    <script src="assets/js/script.js"></script>
</body>
</html>
