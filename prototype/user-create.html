<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建账号 - 胸有成影医疗影像数据管理系统</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>胸有成影</h1>
            </div>
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-item">首页</a>
                <a href="user-management.html" class="menu-item active">用户管理</a>
                <a href="audit-log.html" class="menu-item">审计日志</a>
                <a href="profile.html" class="menu-item">个人中心</a>
                <a href="login.html" class="menu-item">退出登录</a>
            </nav>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部导航栏 -->
            <header class="top-nav">
                <div class="nav-left">
                    <h2>创建账号</h2>
                </div>
                <div class="nav-right">
                    <div class="user-info">
                        <div class="user-avatar">A</div>
                        <span>管理员</span>
                    </div>
                </div>
            </header>
            
            <!-- 内容区域 -->
            <div class="content-area">
                <div class="card">
                    <div class="card-header">
                        <h2>账号信息</h2>
                    </div>
                    <form id="user-form" class="form-container">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="username">用户名 *</label>
                                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                            </div>
                            <div class="form-group">
                                <label for="password">密码 *</label>
                                <input type="password" id="password" name="password" placeholder="请输入密码" required>
                                <div id="password-strength" style="margin-top: 5px; font-size: 12px;">请输入密码</div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">姓名 *</label>
                                <input type="text" id="name" name="name" placeholder="请输入姓名" required>
                            </div>
                            <div class="form-group">
                                <label for="department">科室 *</label>
                                <input type="text" id="department" name="department" placeholder="请输入科室" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="role">角色 *</label>
                            <select id="role" name="role" required>
                                <option value="">请选择</option>
                                <option value="admin">管理员</option>
                                <option value="doctor">医生</option>
                                <option value="researcher">科研人员</option>
                            </select>
                        </div>
                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary">提交</button>
                            <button type="button" class="btn btn-secondary" onclick="navigateTo('user-management.html')">取消</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="assets/js/script.js"></script>
</body>
</html>
