<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 胸有成影医疗影像数据管理系统</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>胸有成影</h1>
            </div>
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-item">首页</a>
                <!-- 医生/科研人员菜单 -->
                <a href="case-management.html" class="menu-item">病例管理</a>
                <a href="model-management.html" class="menu-item">模型管理</a>
                <a href="feedback.html" class="menu-item">评价反馈</a>
                <!-- 管理员菜单 -->
                <a href="user-management.html" class="menu-item">用户管理</a>
                <a href="audit-log.html" class="menu-item">审计日志</a>
                <!-- 通用菜单 -->
                <a href="profile.html" class="menu-item active">个人中心</a>
                <a href="login.html" class="menu-item">退出登录</a>
            </nav>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部导航栏 -->
            <header class="top-nav">
                <div class="nav-left">
                    <h2>个人中心</h2>
                </div>
                <div class="nav-right">
                    <div class="user-info">
                        <div class="user-avatar">D</div>
                        <span>张医生</span>
                    </div>
                </div>
            </header>
            
            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 个人信息 -->
                <div class="card">
                    <div class="card-header">
                        <h2>个人信息</h2>
                    </div>
                    <div class="form-container">
                        <div class="form-row">
                            <div class="form-group">
                                <label>用户名</label>
                                <input type="text" value="doctor1" disabled>
                            </div>
                            <div class="form-group">
                                <label>姓名</label>
                                <input type="text" value="张医生" disabled>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>科室</label>
                                <input type="text" value="超声科" disabled>
                            </div>
                            <div class="form-group">
                                <label>角色</label>
                                <input type="text" value="医生" disabled>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>创建时间</label>
                                <input type="text" value="2026-03-05" disabled>
                            </div>
                            <div class="form-group">
                                <label>上次登录</label>
                                <input type="text" value="2026-03-17 08:00" disabled>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 修改密码 -->
                <div class="card">
                    <div class="card-header">
                        <h2>修改密码</h2>
                    </div>
                    <form class="form-container">
                        <div class="form-group">
                            <label for="old-password">原密码</label>
                            <input type="password" id="old-password" placeholder="请输入原密码">
                        </div>
                        <div class="form-group">
                            <label for="new-password">新密码</label>
                            <input type="password" id="new-password" placeholder="请输入新密码">
                            <div id="password-strength" style="margin-top: 5px; font-size: 12px;">请输入密码</div>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">确认新密码</label>
                            <input type="password" id="confirm-password" placeholder="请确认新密码">
                        </div>
                        <div class="btn-group">
                            <button type="button" class="btn btn-primary">保存修改</button>
                            <button type="reset" class="btn btn-secondary">重置</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="assets/js/script.js"></script>
</body>
</html>
